<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Capítulo VI</title>

<style>
body{
    margin:0;
    height:100vh;
    background:black;
    color:#00b4ff;
    font-family:monospace;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    overflow:hidden;
}

button{
    margin-top:10px;
    padding:10px 18px;
    border:none;
    background:#ffd000;
    cursor:pointer;
}

.glitch{
    animation:glitch 0.2s infinite;
}

@keyframes glitch{
    0%{transform:translate(0);}
    25%{transform:translate(2px,-2px);}
    50%{transform:translate(-2px,2px);}
    75%{transform:translate(2px,2px);}
    100%{transform:translate(0);}
}
</style>

</head>

<body>

<div id="login">

<h2>INSIRA A CHAVE</h2>

<input type="password" id="senha">
<br>
<button onclick="entrar()">ACESSAR</button>
<p id="erro"></p>

</div>

<div id="conteudo" style="display:none;">

<h1 class="glitch">SISTEMA INSTÁVEL</h1>

<p id="texto">Inicializando...</p>

<button id="finalBtn" style="display:none;" onclick="final()">ABRIR MEMÓRIA FINAL</button>

</div>

<script>

function entrar(){

let senha=document.getElementById("senha").value;

if(senha=="davypassivo"){

document.getElementById("login").style.display="none";
document.getElementById("conteudo").style.display="block";

let frases=[
"Conexão instável...",
"Memória corrompida...",
"Projeto D reativado.",
"Eles ainda estão aqui.",
"Você não deveria ter voltado."
];

let i=0;

let loop=setInterval(()=>{

if(i<frases.length){
document.getElementById("texto").innerHTML=frases[i];
i++;
}else{
clearInterval(loop);
document.getElementById("finalBtn").style.display="inline-block";
}

},2000);

}else{
document.getElementById("erro").innerHTML="ACESSO NEGADO.";
}

}

function final(){
window.location.href="https://app.notion.com/p/6-38cc5fba454580758bb9e3d40f88690f";
}

</script>

</body>
</html>
