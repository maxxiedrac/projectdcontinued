<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Project D</title>

<style>
body{
    margin:0;
    height:100vh;
    background:black;
    color:#00b4ff;
    font-family:monospace;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    overflow:hidden;
}

#box{
    max-width:600px;
}

button{
    margin-top:20px;
    padding:12px 20px;
    font-size:16px;
    border:none;
    background:#ffd000;
    cursor:pointer;
    display:none;
    animation:blink 0.8s infinite;
}

@keyframes blink{
    0%{opacity:1;}
    50%{opacity:0.2;}
    100%{opacity:1;}
}

.glitch{
    animation:glitch 0.2s infinite;
}

@keyframes glitch{
    0%{transform:translate(0);}
    25%{transform:translate(2px,-2px);}
    50%{transform:translate(-2px,2px);}
    75%{transform:translate(2px,2px);}
    100%{transform:translate(0);}
}
</style>
</head>

<body>

<audio id="musica">
    <source src="musica.mp3" type="audio/mp3">
</audio>

<div id="box">

<h2 id="texto">...</h2>

<p id="fala"></p>

<button id="btn" onclick="entrar()">ACESSAR</button>

</div>

<script>

let texto=document.getElementById("texto");
let fala=document.getElementById("fala");
let btn=document.getElementById("btn");
let musica=document.getElementById("musica");

/* 🔒 botão começa escondido */
btn.style.display="none";

let frases=[
"Conectando ao seu sistema...",
"Eu vi você voltar.",
"Você sempre volta.",
"Eu não esqueci você.",
"O sistema reconhece sua presença.",
"Agora você não pode sair.",
"Projeto D está ativo novamente."
];

let i=0;

/* 🎧 inicia música só após interação (vamos simular automático depois do load) */
musica.play().catch(()=>{});

/* 💬 troca falas */
let loop=setInterval(()=>{

if(i<frases.length){
    texto.innerHTML="...";
    fala.innerHTML=frases[i];
    i++;
}else{
    clearInterval(loop);
    texto.classList.add("glitch");
    fala.innerHTML="Acesso liberado.";
}

/* ⏳ quando passar ~30s libera botão */
if(i>=frases.length){
    setTimeout(()=>{
        btn.style.display="inline-block";
    },2000);
}

},5000); // cada fala ~5s → total ~30s

function entrar(){
    window.location.href="capitulo6.html";
}

</script>

</body>
</html>
