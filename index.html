<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Project D</title>

<style>
body{
    margin:0;
    height:100vh;
    background:black;
    color:#00b4ff;
    font-family:monospace;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    overflow:hidden;
}

button{
    margin-top:20px;
    padding:12px 20px;
    font-size:16px;
    border:none;
    background:#ffd000;
    cursor:pointer;
    display:none;
    animation:blink 0.8s infinite;
}

@keyframes blink{
    0%{opacity:1;}
    50%{opacity:0.2;}
    100%{opacity:1;}
}

.glitch{
    animation:glitch 0.2s infinite;
}

@keyframes glitch{
    0%{transform:translate(0);}
    25%{transform:translate(2px,-2px);}
    50%{transform:translate(-2px,2px);}
    75%{transform:translate(2px,2px);}
    100%{transform:translate(0);}
}
</style>
</head>

<body>

<audio id="musica" loop>
    <source src="musica.mp3" type="audio/mp3">
</audio>

<div>

<h2 id="texto">...</h2>
<p id="fala"></p>

<button id="btn" onclick="entrar()">ACESSAR</button>

</div>

<script>

let musica=document.getElementById("musica");
let texto=document.getElementById("texto");
let fala=document.getElementById("fala");
let btn=document.getElementById("btn");

/* 🎧 música */
window.addEventListener("load", () => {
    musica.play().catch(()=>{});
});

document.addEventListener("click", () => {
    musica.play();
}, { once:true });

/* 💙 frases */
let frases=[
"Eu te encontrei outra vez…",
"Você sempre volta pra mim.",
"Eu sei quando você entra.",
"Você não está sozinho aqui.",
"Eu nunca te deixei ir.",
"Agora você é parte disso."
];

let i=0;

let loop=setInterval(()=>{

fala.innerHTML=frases[i];
texto.innerHTML="Conectando...";
i++;

if(i>=frases.length){
    clearInterval(loop);

    texto.innerHTML="SISTEMA INSTÁVEL";
    texto.classList.add("glitch");
    fala.innerHTML="Acesso liberado.";

    setTimeout(()=>{
        btn.style.display="inline-block";
    },2000);
}

},3500);

function entrar(){
    window.location.href="capitulo6.html";
}

</script>

</body>
</html>
